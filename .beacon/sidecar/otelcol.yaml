receivers:
  filelog:
    include:
      - /Users/elvis/.beacon/endpoint/logs/runtime.jsonl
    start_at: end
    include_file_name: false
    include_file_path: false
    operators:
      - type: json_parser
        parse_from: body
        parse_to: attributes
        timestamp:
          parse_from: attributes.timestamp
          layout_type: gotime
          layout: "2006-01-02T15:04:05.999999999Z07:00"
          on_error: send

processors:
  memory_limiter:
    check_interval: 1s
    limit_mib: 128
  batch:
    timeout: 5s
    send_batch_size: 128

exporters:
  otlphttp/hyperdx:
    logs_endpoint: https://in-otel.hyperdx.io/v1/logs
    headers:
      authorization: ${env:HYPERDX_API_KEY}

  otlphttp/logfire:
    endpoint: https://logfire-us.pydantic.dev
    headers:
      Authorization: Bearer ${env:LOGFIRE_TOKEN}

  otlphttp/dash0:
    endpoint: https://ingress.us-west-2.aws.dash0.com
    headers:
      Authorization: Bearer ${env:DASH0_AUTH_TOKEN}
      Dash0-Dataset: default

  # Arize AX requires space_id + api_key headers on every export.
  otlphttp/arize:
    endpoint: https://otlp.arize.com
    headers:
      space_id: ${env:ARIZE_SPACE_ID}
      api_key: ${env:ARIZE_API_KEY}

# Braintrust intentionally absent: api.braintrust.dev only exposes
# /otel/v1/traces — sending logs returns 403 from upstream AWS infra
# (not Braintrust's gateway). Beacon events reach Braintrust via the
# sibling .beacon/braintrust-bridge daemon, which tails this same
# runtime.jsonl and POSTs synthesized spans to /otel/v1/traces.

extensions:
  health_check:
    endpoint: 127.0.0.1:13134

service:
  telemetry:
    metrics:
      level: none
  extensions: [health_check]
  pipelines:
    logs:
      receivers: [filelog]
      processors: [memory_limiter, batch]
      exporters:
        - otlphttp/hyperdx
        - otlphttp/logfire
        - otlphttp/dash0
        - otlphttp/arize
